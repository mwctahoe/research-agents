<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Tracker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app">
        <h1>👶 Baby Tracker</h1>

        <!-- Tab Navigation (Mobile Friendly) -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('feed')">🍼 Feed</button>
            <button class="tab-btn" onclick="switchTab('diaper')">💩 Diaper</button>
            <button class="tab-btn" onclick="switchTab('history')">📜 History</button>
            <button class="tab-btn" onclick="switchTab('trends')">📈 Trends</button>
        </div>

        <!-- Forms Container -->
        <div id="forms-section">
            <!-- Feed Form -->
            <form id="feed-form" class="tab-content active">
                <h2>Log Feeding</h2>
                <input type="hidden" id="feed-id">

                <div class="form-group">
                    <label for="feed-date">Date & Time</label>
                    <input type="datetime-local" id="feed-date" required>
                </div>

                <div class="form-group">
                    <label for="feed-type">Feeding Type</label>
                    <select id="feed-type" required onchange="toggleFeedFields()">
                        <option value="bottle">Bottle</option>
                        <option value="breast">Breast</option>
                    </select>
                </div>

                <!-- Bottle Fields -->
                <div id="bottle-fields">
                    <div class="form-group">
                        <label for="feed-amount">Amount (oz)</label>
                        <input type="number" id="feed-amount" step="0.1" min="0">
                    </div>
                </div>

                <!-- Breast Fields -->
                <div id="breast-fields" style="display: none;">
                    <div class="form-group">
                        <label for="feed-side">Side</label>
                        <select id="feed-side">
                            <option value="left">Left</option>
                            <option value="right">Right</option>
                            <option value="both">Both</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="feed-duration">Duration (minutes)</label>
                        <input type="number" id="feed-duration" min="0">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="feed-submit-btn">Save Feeding</button>
                    <button type="button" class="btn-cancel" style="display: none;" onclick="cancelEdit('feed')">Cancel Edit</button>
                </div>
            </form>

            <!-- Diaper Form -->
            <form id="diaper-form" class="tab-content" style="display: none;">
                <h2>Log Diaper Change</h2>
                <input type="hidden" id="diaper-id">

                <div class="form-group">
                    <label for="diaper-date">Date & Time</label>
                    <input type="datetime-local" id="diaper-date" required>
                </div>

                <div class="form-group">
                    <label for="diaper-type">Type</label>
                    <select id="diaper-type" required>
                        <option value="wet">💧 Wet (Pee)</option>
                        <option value="dirty">💩 Dirty (Poop)</option>
                        <option value="both">💧💩 Both</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" id="diaper-submit-btn">Save Diaper</button>
                    <button type="button" class="btn-cancel" style="display: none;" onclick="cancelEdit('diaper')">Cancel Edit</button>
                </div>
            </form>
        </div>

        <!-- History Section -->
        <div id="history-section" class="tab-content" style="display: none;">
            <h2>Recent History</h2>
            <div class="filter-group">
                <label>Filter:</label>
                <select id="history-filter" onchange="renderHistory()">
                    <option value="all">All Logs</option>
                    <option value="feed">Feedings Only</option>
                    <option value="diaper">Diapers Only</option>
                </select>
            </div>
            <div id="history-list">
                <!-- Items populated via JS -->
                <p>No records found.</p>
            </div>
        </div>

        <!-- Charts Section -->
        <div id="trends-section" class="tab-content" style="display: none;">
            <h2>Trends (Last 7 Days)</h2>
            <div class="chart-container">
                <canvas id="feedingChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="diaperChart"></canvas>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
